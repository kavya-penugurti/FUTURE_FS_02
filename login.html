<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <style>
    body{
      font-family:Arial;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:20px;
      border-radius:10px;
      width:300px;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:10px;
      background:blue;
      color:white;
      border:none;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Admin Login</h2>

  <input type="text" id="username" placeholder="Username">

  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login(){

  let username =
    document.getElementById("username").value;

  let password =
    document.getElementById("password").value;

  if(
    username === "kavya" &&
    password === "kavya123"
  ){
    localStorage.setItem("loggedIn","true");
    window.location.href="index.html";
  }
  else{
    alert("Invalid Login");
  }
}
</script>

</body>
</html>
